<body>

    <h1>Rock paper scissors</h1>
    <button onclick="playGames('rock')">rock</button>
    <button onclick="playGames('paper')">paper</button>
    <button onclick="playGames('scissors')">scissors</button>
    <p id="display"></p>

    <script>
        function playGames(game) {
            const computerMove = pickComputerMove();
            let result = '';

            if (game === 'rock') {
                if (computerMove === 'rock') {
                    result = 'tie';
                }
                else if (computerMove === 'paper') {
                    result = 'Lose';
                } else {
                    result = 'Win';
                }
            }
            else if(game==='paper'){
                if(computerMove==='paper'){
                    result='Tie';
                }
                else if (computerMove === 'scissors') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
            }

   else if (game === 'scissors') {
        if (computerMove === 'scissors') {
            result = 'Tie';
        } else if (computerMove === 'rock') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }
 document.getElementById('display').innerHTML =
        `You picked ${game}. Computer picked ${computerMove}. Result = ${result}`;

    alert(`You picked ${game}. Computer picked ${computerMove}. Result = ${result}`);
}
        
        function pickComputerMove() {
            let randomNumber = Math.random();

            if (randomNumber < 1 / 3) {
                return 'rock';
            }
            else if (randomNumber < 2 / 3) {
                return 'paper';

            }
            else {
                return 'scissors';
            }

        }


    </script>
