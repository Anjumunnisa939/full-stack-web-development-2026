<body style="display:flex;
align-items: center;justify-content: center;"">
    
<button  style="padding: 10px 10px; background-color: blue;color: white;font-family: Arial, Helvetica, sans-serif;display:flex;
align-items: center;justify-content: center;"       onclick="turn()" class="flip">start</button>
</body>
<script>
 let  add=  function(a,b){
        for(let i=2;i>0;i--){
            console.log(a+b)
        }
    }
   add(2,3);

</script>
<script>
    let intervalId;
    function turn(){
        const button = document.querySelector('.flip');
     if (intervalId) {
        // Pause
        clearInterval(intervalId);
        intervalId = null;
        return;
    }
        intervalId=setInterval(function(){
if (button.innerHTML === 'start') {
        button.innerHTML = 'loading....';
    }
    else if(button.innerHTML==='loading....') {
button.innerHTML='finished!';
    }
    else {
button.innerHTML='start';
    } 
},1000);
  


setTimeout(function() {
    clearInterval(intervalId);
      button.innerHTML='start';
}, 9000);     


    }

    </script>
