function myFunction() {
    let hours = Number(document.getElementById("hours").value);
    let name = "Anjumunnisa";

    let message =
        (hours >= 6 && hours < 12)
            ? `Good Morning ${name}`
            : (hours >= 12 && hours < 17)
                ? `Good Afternoon ${name}`
                : (hours >= 17 && hours <= 24)
                    ? `Good Evening ${name}`
                    : "Sorry, wrong time";

    document.getElementById("display").innerHTML = message;
}
