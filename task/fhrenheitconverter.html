<!DOCTYPE html>
<html>

<head>
    <title>Temperature Converter</title>
</head>

<body>
    <div>

        <h2>Celsius to Fahrenheit Converter</h2>

        <input type="number" id="celsiusInput" placeholder="Enter Celsius">

        <button onclick="convertToFahrenheit()">
            Convert
        </button>

        <p id="result"></p>
    </div>
    <div>
        <h2>Fahrenheit to celcius coverter</h2>
        <input type="number" id="FarenheitInput" placeholder="enter the fahrenheit">
        <button onclick="ConvertToCelcius()">converrt</button>
        <p id="result1"></p>
    </div>

    <script>
        function convertToFahrenheit() {
            let celsius = Number(document.getElementById("celsiusInput").value);

            let fahrenheit = (celsius * 9 / 5) + 32;

            document.getElementById("result").textContent =
                `${celsius}°C = ${fahrenheit}°F`;
        }
        function ConvertToCelcius() {
            let fahrenheit = Number(document.getElementById("FarenheitInput").value);
            let celcius = (fahrenheit - 32) * 5 / 9;
            document.getElementById("result1").textContent = `${fahrenheit}°F=${celcius}°C`;

        }


    </script>
    <script>// check this in the console output
        function convertTofFahrenheit(celcius) {
            return (celcius * 9 / 5) + 32;
        }
        function convertToCelsius(fahrenheit) {
            return (fahrenheit - 32) * 5 / 9;

        }



        function convertTemperature(degree, unit) {
            if (unit === 'C') {
                return `${convertTofFahrenheit(degree)}F`;
            }
            else if (unit === 'F') {
                return `${convertTofFahrenheit(degree)}C`;
            }
            else {
                return "invalid result";
            }
        }
        console.log(convertTemperature(25, 'C'));
        console.log(convertTemperature(86, 'F'));
    </script>

</html>
