<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROCK PAPER SCISSORS GAME</title>
    <link rel="icon" href="favicon.ico">
</head>

<body>

    <style>
        h1 {
            text-align: center;
        }

        button {
            border: solid;
            border-width: 2px;
            background-color: white;
            border-radius: 10px;
            width: 100px;


        }

        body {
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle,
                    rgba(238, 174, 202, 1) 0%,
                    rgba(148, 187, 233, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: lightblue;
            color: black;
gap:10px
        }

        button:hover {
            background-color: lightblue;
            color: black;
            padding: 10px 10px
        }
        button:active{
            background-color: lightblue;
            color: black;
            padding: 10px 10px
        }
    </style>

    <h1>Rock Paper Scissors</h1>
   <button onclick="playGames('rock')">Rock</button>
   <button onclick="playGames('paper');"> paper</button>
   <button onclick="playGames('scissors') ">Scissors</button>
   <p id="display"></p>
    <!-- Math.random number lies in between 0<=number<1 -->
    


 <script>
function playGames(game) {
    const computerMove = pickComputerMove();
    let result = '';

    if (game === 'rock') {
        if (computerMove === 'rock') {
            result = 'Tie';
        } else if (computerMove === 'paper') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'paper') {
        if (computerMove === 'paper') {
            result = 'Tie';
        } else if (computerMove === 'scissors') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'scissors') {
        if (computerMove === 'scissors') {
            result = 'Tie';
        } else if (computerMove === 'rock') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    document.getElementById('display').innerHTML =
        `You picked ${game}. Computer picked ${computerMove}. Result = ${result}`;

    alert(`You picked ${game}. Computer picked ${computerMove}. Result = ${result}`);
}

function pickComputerMove() {
    const randomNumber = Math.random();

    if (randomNumber < 1 / 3) {
        return 'rock';
    } 
    else if (randomNumber < 2 / 3) {
        return 'paper';
    } 
    else {
        return 'scissors';
    }
}
</script>

</body>

</html>
