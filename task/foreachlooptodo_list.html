<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROCK PAPER SCISSORS GAME</title>
    <link rel="icon" href="favicon.ico">

</head>
<body>

    <style>
      body{
        background-color: black;
        color:white;
        font-family: Arial, Helvetica, sans-serif;
flex-wrap: wrap;
line-height: 50px;
      }
      .title{
        font-size:30px;
        font-weight:bold;
      }
     .move-icon{
        height:50px;
      

     }
     .reset{
        margin-top:25px;
        
     }
     .reseting,.auto-play-button{
        background-color: skyblue;
        color:black;
        padding: 10px ;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        border-radius: 45px;
     }
     .move-button{
        background-color: transparent;
        border:3px solid white;
        width:100px;
        height:120px;
        border-radius:50%;
        margin-right: 10px;
        cursor: pointer;
     }
    </style>

    <h1 vlass="title">Rock Paper Scissors</h1>
   <button onclick="playGames('rock')" class="move-button"><img src="../../images/rock-emoji.png"alt="rockimge" class="move-icon"></button>
   <button onclick="playGames('paper');"class="move-button"><img src="../../images/paper-emoji.png" alt="paper-image" class="move-icon"></button>
   <button onclick="playGames('scissors')"class="move-button"><img src="../../images/scissors-emoji.png" alt="scissor-image" class="move-icon"></button>
  

<h1 class="result js-result"></h1>

<p class="js-moves"></p>

<p class="score js-score"></p>

 <p id="display"></p>
   <div class="reset">
    
<button onclick="score.wins=0;
score.losses=0;
score.ties=0;
localStorage.removeItem('score');
document.getElementById('display').innerHTML =
'Wins: 0 Losses: 0 Ties: 0';
" class="reseting">
reset score</button>
<button class="auto-play-button" onclick="autoPlay();">Auto play</button>
</div>
 <script>
const score=(JSON.parse(localStorage.getItem('score')))|| {
   wins:0,
   losses:0,
   ties:0

};


// console.log(score);

// if(!score){

// score={
//    wins:0,
//    losses:0,
//    ties:0

// };
// }

let isautoplay=false;
let intervalId;


function autoPlay(){
    if(!isautoplay){
     intervalId= setInterval(function(){
        const playerMove=pickComputerMove()
        playGames(playerMove)},1000);
        isautoplay=true;
    }
  else{
clearInterval(intervalId);
isautoplay=false;
  }

}
function playGames(game) {
    const computerMove = pickComputerMove();
    let result = '';

    if (game === 'rock') {
        if (computerMove === 'rock') {
            result = 'Tie';
        } else if (computerMove === 'paper') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'paper') {
        if (computerMove === 'paper') {
            result = 'Tie';
        } else if (computerMove === 'scissors') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'scissors') {
        if (computerMove === 'scissors') {
            result = 'Tie';
        } else if (computerMove === 'rock') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }
if(result==='Win'){
    score.wins=score.wins+1;

}
else if(result==='Lose'){
    score.losses=score.losses+1;

}
else if(result==='Tie'){
    score.ties=score.ties+1;
}
localStorage.setItem('score',JSON.stringify(score));
    // document.getElementById('display').innerHTML =
    //     `You picked ${game}. Computer picked ${computerMove}. <br>Result = ${result}
    //     <br>wins${score.wins} ::loses${score.losses}:: tie${score.ties}`;

document.querySelector('.js-result').innerHTML = result;

document.querySelector('.js-moves').innerHTML =
`You
<img src="../../images/${game}-emoji.png" class="move-icon">

<img src="../../images/${computerMove}-emoji.png" class="move-icon">
Computer`;

document.querySelector('.js-score').innerHTML =
`Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;



    //alert(`You picked ${game}. Computer picked ${computerMove}. Result = ${result}
     //wins${score.wins} ::loses${score.losses}:: tie${score.ties}`);
}

function pickComputerMove() {
    const randomNumber = Math.random();

    if (randomNumber < 1 / 3) {
        return 'rock';
    } 
    else if (randomNumber < 2 / 3) {
        return 'paper';
    } 
    else {
        return 'scissors';
    }
}
</script>

</body>

</html>
