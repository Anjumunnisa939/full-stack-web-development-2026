<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROCK PAPER SCISSORS GAME</title>
    <link rel="icon" href="favicon.ico">
</head>

<body>

   

    <h1>Rock Paper Scissors</h1>
   <button onclick="playGames('rock')"></button>
   <button onclick="playGames('paper');"> paper</button>
   <button onclick="playGames('scissors') ">Scissors</button>
  
    <!-- Math.random number lies in between 0<=number<1 -->
    
<button onclick="score.wins=0;
score.losses=0;
score.ties=0;
localStorage.removeItem('score');
document.getElementById('display').innerHTML =
'Wins: 0 Losses: 0 Ties: 0';
">
reset</button>
 <p id="display"></p>
 <script>
const score=(JSON.parse(localStorage.getItem('score')))|| {
   wins:0,
   losses:0,
   ties:0

};


// console.log(score);

// if(!score){

// score={
//    wins:0,
//    losses:0,
//    ties:0

// };
// }

function playGames(game) {
    const computerMove = pickComputerMove();
    let result = '';

    if (game === 'rock') {
        if (computerMove === 'rock') {
            result = 'Tie';
        } else if (computerMove === 'paper') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'paper') {
        if (computerMove === 'paper') {
            result = 'Tie';
        } else if (computerMove === 'scissors') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }

    else if (game === 'scissors') {
        if (computerMove === 'scissors') {
            result = 'Tie';
        } else if (computerMove === 'rock') {
            result = 'Lose';
        } else {
            result = 'Win';
        }
    }
if(result==='Win'){
    score.wins=score.wins+1;

}
else if(result==='Lose'){
    score.losses=score.losses+1;

}
else if(result==='Tie'){
    score.ties=score.ties+1;
}
localStorage.setItem('score',JSON.stringify(score));
    document.getElementById('display').innerHTML =
        `You picked ${game}. Computer picked ${computerMove}. Result = ${result}
        wins${score.wins} ::loses${score.losses}:: tie${score.ties}`;

    alert(`You picked ${game}. Computer picked ${computerMove}. Result = ${result}
     wins${score.wins} ::loses${score.losses}:: tie${score.ties}`);
}

function pickComputerMove() {
    const randomNumber = Math.random();

    if (randomNumber < 1 / 3) {
        return 'rock';
    } 
    else if (randomNumber < 2 / 3) {
        return 'paper';
    } 
    else {
        return 'scissors';
    }
}
</script>

</body>

</html>>
